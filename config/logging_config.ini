# 系统日志配置文件
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
LOG_LEVEL = INFO

# 日志文件路径
LOG_DIR = logs

# 主应用日志
APP_LOG_FILE = app.log
APP_LOG_MAX_SIZE = 10MB
APP_LOG_BACKUP_COUNT = 5

# 系统日志
SYSTEM_LOG_FILE = core_ui_system.log
SYSTEM_LOG_MAX_SIZE = 5MB
SYSTEM_LOG_BACKUP_COUNT = 3

# 错误日志
ERROR_LOG_FILE = error.log
ERROR_LOG_MAX_SIZE = 2MB
ERROR_LOG_BACKUP_COUNT = 3

# 调试日志
DEBUG_LOG_FILE = debug.log
DEBUG_LOG_MAX_SIZE = 5MB
DEBUG_LOG_BACKUP_COUNT = 2

# 控制台日志级别
CONSOLE_LOG_LEVEL = INFO

# 日志格式
LOG_FORMAT = '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
LOG_DATE_FORMAT = '%Y-%m-%d %H:%M:%S'

# 启用日志轮转
ENABLE_LOG_ROTATION = True

# 启用异常详细记录
ENABLE_EXCEPTION_DETAILS = True
